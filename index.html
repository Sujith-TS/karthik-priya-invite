<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Great+Vibes&family=Poppins:wght@300;400;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
}

/* ===== EXISTING STYLES ===== */
.envelope {
  width: 100%;
  height: 100vh;
  background: url('cg.png') center/cover no-repeat;
}

.click-area {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 150px;
  height: 150px;
  border-radius: 50%;
  cursor: pointer;
}

.content {
  display: none;
  overflow-y: auto;
  height: 100vh;
}

/* ===== WISH BUTTON ===== */
.wish-btn {
  padding: 12px 22px;
  background: #25D366;
  color: #fff;
  border: none;
  border-radius: 30px;
  cursor: pointer;
}

/* ===== POPUP ===== */
.popup {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

.popup-box {
  background: #fff;
  padding: 20px;
  border-radius: 15px;
  width: 85%;
  max-width: 320px;
  text-align: center;
}

.popup-box input,
.popup-box textarea {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
}

/* ===== WISH CARDS ===== */
.wish-container {
  display: flex;
  gap: 15px;
  overflow: hidden;
  padding: 20px;
}

.wish-card {
  min-width: 220px;
  background: #fff;
  padding: 15px;
  border-radius: 15px;
  animation: scrollLeft 20s linear infinite;
}

@keyframes scrollLeft {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="AUD-20260406-WA0005.mp3">
</audio>

<div class="envelope" id="env">
  <div class="click-area" onclick="openInvite()"></div>
</div>

<div class="content" id="content">

  <h2 style="text-align:center;">Karthik ❤️ Priya</h2>

  <!-- WISHES DISPLAY -->
  <div class="wish-container" id="wishContainer"></div>

  <!-- CALENDAR -->
  <div style="text-align:center;">
    <a href="wedding.ics">📅 Add to Calendar</a>
  </div>

  <!-- SEND BUTTON -->
  <div style="text-align:center; margin:20px;">
    <button class="wish-btn" onclick="openWishPopup()">💬 Send Wishes</button>
  </div>

</div>

<!-- POPUP -->
<div id="wishPopup" class="popup">
  <div class="popup-box">
    <h3>Send Wishes</h3>
    <input id="userName" placeholder="Your Name">
    <textarea id="userWish" placeholder="Your Wish"></textarea>
    <button onclick="sendWish()">Send</button>
    <button onclick="closeWishPopup()">Close</button>
  </div>
</div>

<script>
function openInvite(){
  document.getElementById("env").style.display="none";
  document.getElementById("content").style.display="block";
  document.getElementById("music").play();
}

function openWishPopup(){
  document.getElementById("wishPopup").style.display="flex";
}

function closeWishPopup(){
  document.getElementById("wishPopup").style.display="none";
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDN9Et8HDu3dSwrPkWQyLwgI3Jo2LIk5os",
  authDomain:"wedding-invites-e922c.firebaseapp.com",
  projectId:"wedding-invites-e922c"
});

const db = getFirestore(app);
const eventId = "karthik-priya";

/* SAVE */
window.sendWish = async function(){
  let name = document.getElementById("userName").value;
  let wish = document.getElementById("userWish").value;

  if(!name || !wish){
    alert("Fill all fields");
    return;
  }

  await addDoc(collection(db,"wishes"),{
    name,
    message:wish,
    eventId,
    time:Date.now()
  });

  closeWishPopup();
};

/* DISPLAY */
const q = query(
  collection(db,"wishes"),
  where("eventId","==",eventId)
);

onSnapshot(q,(snap)=>{
  let c=document.getElementById("wishContainer");
  c.innerHTML="";
  snap.forEach(doc=>{
    let d=doc.data();
    c.innerHTML+=`<div class="wish-card"><b>${d.name}</b><p>${d.message}</p></div>`;
  });
});
</script>

</body>
</html>
