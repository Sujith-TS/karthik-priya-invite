<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Great+Vibes&family=Poppins:wght@300;400;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
}

/* ENVELOPE */
.envelope {
  width: 100%;
  height: 100vh;
  background: url('cg.png') center/cover no-repeat;
  position: relative;
}

.click-area {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 150px;
  height: 150px;
  border-radius: 50%;
  cursor: pointer;
}

/* CONTENT */
.content {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #fff;
  display: none;
  overflow-y: auto;
}

.section {
  text-align: center;
  padding: 60px 25px;
}

/* GANESHA */
.ganesha-box {
  width: 110px;
  height: 110px;
  margin: auto;
  border-radius: 50%;
  background: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
}

.ganesha { width: 65px; }

.ganesha-text {
  font-size: 13px;
  font-family: 'Playfair Display';
  color: #2f6f67;
}

/* NAMES */
.names {
  font-family: 'Allura';
  font-size: 3.6rem;
  color: #2f6f67;
}

.with-text {
  font-family: 'Allura';
  font-size: 2.5rem;
  color: #2f6f67;
}

/* TEXT */
.styled-text {
  font-family: 'Allura';
  font-size: 2rem;
  color: #000;
}

/* CARD */
.card {
  background: #dbeeee;
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
}

/* BUTTONS */
.map-btn, .calendar-btn, .wish-btn {
  display: inline-block;
  padding: 10px 20px;
  margin-top: 10px;
  border-radius: 25px;
  text-decoration: none;
  color: #fff;
}

.map-btn { background: #2f6f67; }
.calendar-btn { background: #000; }
.wish-btn { background: #25D366; border:none; cursor:pointer; }

/* COUPLE */
.couple-img {
  width: 85%;
  max-width: 320px;
  border-radius: 30px;
}

/* WISHES */
.wish-container {
  display: flex;
  gap: 15px;
  overflow: hidden;
  padding: 20px;
}

.wish-card {
  min-width: 220px;
  background: #fff;
  padding: 15px;
  border-radius: 15px;
  animation: scroll 20s linear infinite;
}

@keyframes scroll {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

/* POPUP */
.popup {
  position: fixed;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-box {
  background:#fff;
  padding:20px;
  border-radius:15px;
  width:85%;
  max-width:320px;
  text-align:center;
}

.popup-box input, .popup-box textarea {
  width:100%;
  margin-top:10px;
  padding:10px;
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="AUD-20260406-WA0005.mp3">
</audio>

<div class="envelope" id="env">
  <div class="click-area" onclick="openInvite()"></div>
</div>

<div class="content" id="content">

<div class="section">

<div class="ganesha-box">
<img src="ganesha.png.jpg" class="ganesha">
</div>

<h3 class="ganesha-text">||Shree Ganeshaya Namaha||</h3>

<div class="names">Karthik</div>
<p>S/o Parents</p>

<p class="with-text">With</p>

<div class="names">Priya</div>
<p>D/o Parents</p>

<p class="styled-text">With joyful hearts,<br>we invite you</p>

<img src="couple.jpg" class="couple-img">

</div>

<div class="card">
<h3>Wedding</h3>
<p>Venue<br>Bangalore</p>
<a href="https://maps.google.com" target="_blank" class="map-btn">📍 Location</a>
</div>

<div class="card">
<h3>Reception</h3>
<p>Venue<br>Bangalore</p>
</div>

<div class="wish-container" id="wishContainer"></div>

<div style="text-align:center;">
<a href="wedding.ics" class="calendar-btn">📅 Calendar</a>
</div>

<div style="text-align:center;">
<button class="wish-btn" onclick="openWishPopup()">💬 Send Wishes</button>
</div>

</div>

<!-- POPUP -->
<div id="wishPopup" class="popup">
<div class="popup-box">
<h3>Send Wishes</h3>
<input id="userName" placeholder="Your Name">
<textarea id="userWish" placeholder="Your Wish"></textarea>
<button onclick="sendWish()">Send</button>
<button onclick="closeWishPopup()">Close</button>
</div>
</div>

<script>
function openInvite(){
document.getElementById("env").style.display="none";
document.getElementById("content").style.display="block";
document.getElementById("music").play();
}

function openWishPopup(){
document.getElementById("wishPopup").style.display="flex";
}

function closeWishPopup(){
document.getElementById("wishPopup").style.display="none";
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyDN9Et8HDu3dSwrPkWQyLwgI3Jo2LIk5os",
authDomain:"wedding-invites-e922c.firebaseapp.com",
projectId:"wedding-invites-e922c"
});

const db = getFirestore(app);
const eventId="karthik-priya";

window.sendWish = async function(){
let name=document.getElementById("userName").value;
let wish=document.getElementById("userWish").value;

await addDoc(collection(db,"wishes"),{
name:name,
message:wish,
eventId:eventId,
time:Date.now()
});

closeWishPopup();
};

const q=query(collection(db,"wishes"),where("eventId","==",eventId),orderBy("time","desc"));

onSnapshot(q,(snap)=>{
let c=document.getElementById("wishContainer");
c.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();
c.innerHTML+=`<div class="wish-card"><b>${d.name}</b><p>${d.message}</p></div>`;
});
});
</script>

</body>
</html>
